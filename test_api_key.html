<!DOCTYPE html>
<html>
<head>
    <title>Firebase API Key Test</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #1a1a1a;
            color: #fff;
            padding: 40px;
            max-width: 800px;
            margin: 0 auto;
        }
        .container {
            background: #2a2a2a;
            padding: 30px;
            border-radius: 10px;
            border: 1px solid #3a3a3a;
        }
        h1 {
            color: #4CAF50;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px 0;
        }
        button:hover {
            background: #45a049;
        }
        .log {
            background: #000;
            padding: 20px;
            border-radius: 5px;
            margin-top: 20px;
            min-height: 200px;
            max-height: 500px;
            overflow-y: auto;
        }
        .success { color: #4CAF50; }
        .error { color: #f44336; }
        .warning { color: #ff9800; }
        .info { color: #2196F3; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔥 Firebase API Key Validator</h1>
        <p>Testing API Key: <code>AIzaSyClG1zFNb6sflC0yKO-Mmbawqq6ReqazpI</code></p>
        
        <button onclick="testAPIKey()">🧪 Test API Key</button>
        <button onclick="testWithCurl()">📋 Show cURL Command</button>
        <button onclick="clearLog()">🗑️ Clear Log</button>
        
        <div class="log" id="log"></div>
    </div>

    <script>
        const API_KEY = 'AIzaSyClG1zFNb6sflC0yKO-Mmbawqq6ReqazpI';
        const log = document.getElementById('log');

        function addLog(message, type = 'info') {
            const time = new Date().toLocaleTimeString();
            const line = document.createElement('div');
            line.className = type;
            line.innerHTML = `[${time}] ${message}`;
            log.appendChild(line);
            log.scrollTop = log.scrollHeight;
        }

        function clearLog() {
            log.innerHTML = '';
        }

        async function testAPIKey() {
            clearLog();
            addLog('🔍 Starting API Key validation tests...', 'info');
            addLog('━'.repeat(60), 'info');
            
            // Test 1: Check if API key format is valid
            addLog('', 'info');
            addLog('Test 1: API Key Format Check', 'info');
            if (API_KEY.startsWith('AIza') && API_KEY.length === 39) {
                addLog('✅ API Key format is valid', 'success');
            } else {
                addLog('❌ API Key format looks invalid', 'error');
            }

            // Test 2: Try to use the API key with Identity Toolkit
            addLog('', 'info');
            addLog('Test 2: Identity Toolkit API Test', 'info');
            addLog('Attempting to call Firebase Auth API...', 'info');
            
            try {
                const response = await fetch(
                    `https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=${API_KEY}`,
                    {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            email: `test_${Date.now()}@test.com`,
                            password: 'TestPassword123',
                            returnSecureToken: true
                        })
                    }
                );

                const data = await response.json();
                
                addLog(`Response Status: ${response.status}`, 'info');
                addLog(`Response: ${JSON.stringify(data, null, 2)}`, 'info');

                if (response.ok) {
                    addLog('✅ API Key is VALID and working!', 'success');
                    addLog('✅ Identity Toolkit API is accessible', 'success');
                    addLog('✅ Firebase Authentication is properly configured', 'success');
                    addLog('', 'info');
                    addLog('🎉 Great! Your API key works fine!', 'success');
                    addLog('The error might be coming from somewhere else.', 'warning');
                } else if (data.error) {
                    if (data.error.message.includes('API_KEY_INVALID') || 
                        data.error.message.includes('API key not valid')) {
                        addLog('❌ API Key is INVALID or RESTRICTED', 'error');
                        addLog('', 'error');
                        addLog('🔧 How to fix:', 'warning');
                        addLog('1. Go to Google Cloud Console', 'warning');
                        addLog('2. Navigate to: APIs & Services > Credentials', 'warning');
                        addLog('3. Click on your API Key', 'warning');
                        addLog('4. Under Application restrictions: Select "None"', 'warning');
                        addLog('5. Under API restrictions: Select "Don\'t restrict key"', 'warning');
                        addLog('6. Save and wait 5-10 minutes', 'warning');
                    } else if (data.error.message.includes('EMAIL_EXISTS')) {
                        addLog('✅ API Key works! (Test email already exists)', 'success');
                    } else if (data.error.message.includes('OPERATION_NOT_ALLOWED')) {
                        addLog('⚠️ API Key is valid, but Email/Password auth is not enabled', 'warning');
                        addLog('', 'warning');
                        addLog('🔧 How to fix:', 'warning');
                        addLog('1. Go to Firebase Console', 'warning');
                        addLog('2. Click Authentication > Sign-in method', 'warning');
                        addLog('3. Enable Email/Password provider', 'warning');
                        addLog('4. Save changes', 'warning');
                    } else {
                        addLog(`⚠️ Unexpected error: ${data.error.message}`, 'warning');
                    }
                }
            } catch (error) {
                addLog('❌ Network error or CORS issue', 'error');
                addLog(`Error: ${error.message}`, 'error');
                addLog('', 'warning');
                addLog('This might be due to browser CORS restrictions.', 'warning');
                addLog('The API key might still be valid.', 'warning');
            }

            addLog('', 'info');
            addLog('━'.repeat(60), 'info');
            addLog('✅ Test completed!', 'info');
        }

        function testWithCurl() {
            clearLog();
            addLog('📋 cURL Command to Test API Key:', 'info');
            addLog('', 'info');
            addLog('Copy and paste this command in your terminal:', 'warning');
            addLog('', 'info');
            
            const curlCommand = `curl -X POST \\
  "https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=${API_KEY}" \\
  -H "Content-Type: application/json" \\
  -d '{
    "email": "test@test.com",
    "password": "TestPassword123",
    "returnSecureToken": true
  }'`;
            
            addLog(curlCommand, 'info');
            addLog('', 'info');
            addLog('Expected results:', 'info');
            addLog('✅ If you see "idToken" in response: API key works!', 'success');
            addLog('❌ If you see "API_KEY_INVALID": Key is restricted or invalid', 'error');
            addLog('⚠️ If you see "OPERATION_NOT_ALLOWED": Enable Email/Password auth', 'warning');
        }

        // Auto-run test on page load
        window.onload = function() {
            addLog('🔥 Firebase API Key Validator Ready', 'success');
            addLog('Click "Test API Key" button to start testing', 'info');
        };
    </script>
</body>
</html>
