<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="FoodGeniusAI - AI-powered recipe generation and culinary inspiration">
  
  <!-- Preconnect to external resources for faster loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firebasestorage.googleapis.com">
  
  <!-- Load fonts via CSS (faster than runtime google_fonts fetch) -->
  <!-- Inter for app UI, Roboto as Flutter's fallback font for Material widgets -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  
  <!-- DNS prefetch for Firebase services -->
  <link rel="dns-prefetch" href="https://www.gstatic.com">
  <link rel="dns-prefetch" href="https://firebaseinstallations.googleapis.com">
  <link rel="dns-prefetch" href="https://identitytoolkit.googleapis.com">
  
  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FoodGeniusAI">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>FoodGeniusAI - AI-Powered Recipe Generation</title>
  <link rel="manifest" href="manifest.json">
  
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0A1628;
      font-family: 'Inter', sans-serif;
    }

    .splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #0A1628;
      z-index: 999;
      transition: opacity 0.3s ease;
    }

    .splash-title {
      font-size: 2.5rem;
      font-weight: 700;
      color: #2DD4BF;
      letter-spacing: -0.5px;
      margin-bottom: 2rem;
    }

    .splash-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(45, 212, 191, 0.15);
      border-top-color: #2DD4BF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Branded splash shown instantly while Flutter loads -->
  <div id="splash" class="splash">
    <div class="splash-title">FoodGeniusAI</div>
    <div class="splash-spinner"></div>
  </div>

  <script>
    {{flutter_js}}
    {{flutter_build_config}}

    _flutter.loader.load({
      onEntrypointLoaded: async function(engineInitializer) {
        const appRunner = await engineInitializer.initializeEngine({
          renderer: "html",
        });
        await appRunner.runApp();
        // Hide splash once Flutter has painted
        const splash = document.getElementById("splash");
        if (splash) splash.style.opacity = "0";
        setTimeout(() => { if (splash) splash.remove(); }, 300);
      }
    });
  </script>
</body>
</html>
